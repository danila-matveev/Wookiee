name: Hygiene Autofix

on:
  schedule:
    - cron: "0 4 * * *"  # 04:00 UTC = 1 hour after hygiene-daily
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Target PR number (optional; default: latest open chore/hygiene-* PR)"
        required: false
        type: string
      dry_run:
        description: "Report what would be fixed without pushing"
        required: false
        default: false
        type: boolean

concurrency:
  group: hygiene-autofix
  cancel-in-progress: false

jobs:
  autofix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout (full history for git ops)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary python-dotenv pyyaml requests

      - name: Configure git identity
        run: |
          git config user.name "claude[bot]"
          git config user.email "claude-bot@anthropic.com"

      - name: Run /hygiene-autofix via Claude Code action
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            /hygiene-autofix${{ inputs.pr_number && format(' --pr {0}', inputs.pr_number) || '' }}${{ inputs.dry_run && ' --dry-run' || '' }}
          claude_args: "--allowed-tools Bash,Read,Edit,Write,Skill"
        env:
          TELEGRAM_ALERTS_BOT_TOKEN: ${{ secrets.TELEGRAM_ALERTS_BOT_TOKEN }}
          HYGIENE_TELEGRAM_CHAT_ID: ${{ secrets.HYGIENE_TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          HYGIENE_TRIGGER: ${{ github.event_name == 'schedule' && 'cron' || 'manual' }}
          HYGIENE_ENV: production
