name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            PROJECT_DIR="/home/danila/projects/wookiee"
            cd "$PROJECT_DIR"

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Pre-deploy guard ==="
            if [ -x "$PROJECT_DIR/scripts/server_predeploy_check.sh" ]; then
              REPO="$PROJECT_DIR" "$PROJECT_DIR/scripts/server_predeploy_check.sh"
            fi

            echo "=== Building and deploying Wookiee services ==="
            cd deploy
            docker compose build
            docker compose up -d --remove-orphans

            echo "=== Waiting for startup (30s) ==="
            sleep 30

            echo "=== Container status ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.RunningFor}}"

            echo "=== Healthcheck status ==="
            for container in wookiee_cron wookiee_sheets_sync; do
              status=$(docker inspect "$container" --format='{{.State.Health.Status}}' 2>/dev/null || echo "no-healthcheck")
              echo "$container: $status"
            done
