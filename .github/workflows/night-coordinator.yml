name: Night Coordinator (Night DevOps)

# Wave B5 of Nighttime DevOps Agent. THE ONLY WORKFLOW THAT OPENS A PR.
# Reads .hygiene/reports/hygiene-*.json + code-quality-*.json + queue.yaml
# + decisions.yaml, merges SAFE fixes into a single branch night-devops/YYYY-MM-DD,
# opens 1 PR via `gh pr create`, marks `gh pr merge --auto`. NEEDS_HUMAN items
# go to .hygiene/queue.yaml and a Telegram digest in plain Russian.
#
# In read-only mode (.hygiene/config.yaml: read_only: true) — no PR opened,
# just Telegram preview + JSON commit to a reports-only branch.
#
# Plan: docs/superpowers/plans/2026-05-14-nighttime-devops-agent-impl.md §6, §7

on:
  schedule:
    - cron: "0 4 * * *"  # 04:00 UTC
  workflow_dispatch:

concurrency:
  group: night-devops
  cancel-in-progress: false

jobs:
  night-coordinator:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout (full history, needed for git revert SHA lookups)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install coordinator deps
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary python-dotenv pyyaml requests jsonschema

      - name: Run /night-coordinator via Claude Code action
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "/night-coordinator"
          claude_args: "--allowed-tools Bash,Read,Edit,Write,Skill"
        env:
          TELEGRAM_ALERTS_BOT_TOKEN: ${{ secrets.TELEGRAM_ALERTS_BOT_TOKEN }}
          HYGIENE_TELEGRAM_CHAT_ID: ${{ secrets.HYGIENE_TELEGRAM_CHAT_ID }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          # gh CLI needs this for pr create / pr merge --auto:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HYGIENE_ENV: github_actions

      - name: Upload coordinator report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coordinator-report-${{ github.run_id }}
          path: .hygiene/reports/coordinator-*.json
          if-no-files-found: warn
          retention-days: 30

      - name: Telegram alert on failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_ALERTS_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.HYGIENE_TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT}" \
              -d "text=[wookiee night] night-coordinator 04:00 UTC упал — PR не создан, состояние репо не тронуто. См. https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              > /dev/null
          fi
