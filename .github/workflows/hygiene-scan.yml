name: Hygiene Scan (Night DevOps)

# Wave B5 of Nighttime DevOps Agent.
# Runs alongside hygiene-daily.yml (which is preserved as-is). This workflow
# emits a JSON report consumed by night-coordinator at 04:00 UTC. It does NOT
# open a PR — that is exclusively the responsibility of night-coordinator.yml.
#
# Plan: docs/superpowers/plans/2026-05-14-nighttime-devops-agent-impl.md

on:
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC
  workflow_dispatch:

concurrency:
  group: night-devops
  cancel-in-progress: false

jobs:
  hygiene-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install hygiene deps
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary python-dotenv pyyaml requests jsonschema

      - name: Run /hygiene --json-output via Claude Code action
        id: hygiene
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "/hygiene --json-output"
          claude_args: "--allowed-tools Bash,Read,Edit,Write,Skill"
        env:
          TELEGRAM_ALERTS_BOT_TOKEN: ${{ secrets.TELEGRAM_ALERTS_BOT_TOKEN }}
          HYGIENE_TELEGRAM_CHAT_ID: ${{ secrets.HYGIENE_TELEGRAM_CHAT_ID }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          HYGIENE_TRIGGER: ${{ github.event_name }}
          HYGIENE_ENV: github_actions

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hygiene-report-${{ github.run_id }}
          path: .hygiene/reports/hygiene-*.json
          if-no-files-found: warn
          retention-days: 30

      - name: Telegram alert on failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_ALERTS_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.HYGIENE_TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT}" \
              -d "text=[wookiee night] hygiene-scan 03:00 UTC упал — PR не открыт, состояние репо не тронуто. См. https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              > /dev/null
          fi
