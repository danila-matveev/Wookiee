name: Hygiene Scan (Night DevOps)

# Wave B5 of Nighttime DevOps Agent.
# Emits a JSON report consumed by night-coordinator at 04:00 UTC. It does NOT
# open a PR — that is exclusively the responsibility of night-coordinator.yml.
#
# Plan: docs/superpowers/plans/2026-05-14-nighttime-devops-agent-impl.md

on:
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC
  workflow_dispatch:

concurrency:
  group: night-devops
  cancel-in-progress: false

jobs:
  hygiene-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install hygiene deps
        run: |
          python -m pip install --upgrade pip
          pip install pydantic pyyaml

      - name: Run deterministic hygiene scan
        run: python -m scripts.nightly.hygiene_scan --print-summary

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hygiene-report-${{ github.run_id }}
          path: |
            .hygiene/reports/hygiene-*.json
            .hygiene/reports/hygiene-*.md
          if-no-files-found: warn
          retention-days: 30

      - name: Set up Node 20 (for wrangler / cloudflare-pub)
        if: always()
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install wrangler
        if: always()
        run: npm i -g wrangler

      - name: Publish hygiene report to Cloudflare
        if: always()
        continue-on-error: true
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          report="$(ls .hygiene/reports/hygiene-*.md | sort | tail -1)"
          if [ -z "$CF_ACCOUNT_ID" ] || [ -z "$CF_API_TOKEN" ]; then
            echo "::warning::Cloudflare credentials are not configured; JSON artifact was still uploaded."
            exit 0
          fi
          python .claude/skills/cloudflare-pub/scripts/publish.py "$report" \
            --name "wookiee-hygiene-$(date -u +%Y-%m-%d)" \
            --title "Wookiee Hygiene Run $(date -u +%Y-%m-%d)"

      - name: Telegram alert on failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_ALERTS_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.HYGIENE_TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT}" \
              -d "text=Не доделал ночной сканер репозитория.%0A%0AРепо не тронул, фиксы не применял. Завтра попробую ещё раз.%0AЛоги, если хочешь глянуть: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              > /dev/null
          fi
