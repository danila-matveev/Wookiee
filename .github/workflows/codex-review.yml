name: Codex Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel previous run if new push to same PR
concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip drafts and bot PRs (hygiene/claude-bot already use their own logic)
    if: github.event.pull_request.draft == false && !contains(github.event.pull_request.user.login, '[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Get PR diff
        id: diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Limit diff to 50K chars to fit context
          git diff "$BASE_SHA"..."$HEAD_SHA" | head -c 200000 > /tmp/pr-diff.patch
          DIFF_SIZE=$(wc -c < /tmp/pr-diff.patch)
          echo "diff_size=$DIFF_SIZE" >> "$GITHUB_OUTPUT"
          echo "PR diff size: $DIFF_SIZE bytes"

      - name: Skip if diff empty or huge
        id: skip
        run: |
          SIZE="${{ steps.diff.outputs.diff_size }}"
          if [ "$SIZE" -lt 100 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping — diff too small ($SIZE bytes)"
          elif [ "$SIZE" -gt 180000 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping — diff too large for context ($SIZE bytes), review manually"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Call OpenAI for review
        if: steps.skip.outputs.skip != 'true'
        id: openai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "OPENAI_API_KEY secret not set — skipping Codex review. Add it in repo Settings → Secrets."
            exit 0
          fi

          PROMPT_HEAD=$(cat <<'HEAD'
Ты — старший инженер, делаешь review pull request на проекте Wookiee (Python ETL/аналитика WB+OZON, FastAPI/React Hub, Supabase).

Найди ТОЛЬКО реальные проблемы: bugs, security issues, broken logic, performance pitfalls, нарушения rules (Decimal для денег, LOWER() для group by по моделям, async patterns, no .env hardcoding).

Игнорируй стилистические придирки, comments-style, формат markdown, типы при очевидном контексте.

Формат ответа:
- Если всё ок: "✅ LGTM" одной строкой
- Если есть проблемы: ## Findings\n\n### Critical/Important/Minor — каждый пункт с file:line и краткой причиной (1-2 строки)

Diff:
HEAD
)

          # Build JSON payload safely
          jq -n \
            --arg model "gpt-5" \
            --arg system "$PROMPT_HEAD" \
            --rawfile diff /tmp/pr-diff.patch \
            '{
              model: $model,
              messages: [
                {role: "system", content: $system},
                {role: "user", content: $diff}
              ],
              max_completion_tokens: 4000
            }' > /tmp/openai-request.json

          curl -sS -X POST https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @/tmp/openai-request.json > /tmp/openai-response.json

          REVIEW=$(jq -r '.choices[0].message.content // .error.message // "Codex review unavailable"' /tmp/openai-response.json)
          echo "$REVIEW" > /tmp/review.md

          # Truncate to 60K chars (GitHub comment limit ~65K)
          head -c 60000 /tmp/review.md > /tmp/review-trunc.md
          echo "review_file=/tmp/review-trunc.md" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Post review comment
        if: steps.openai.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          BODY_HEAD="## 🤖 Codex Review (GPT-5)"
          BODY=$(printf '%s\n\n%s\n\n---\n_Automated review by Codex. Не блокирует merge — справочная информация._\n' "$BODY_HEAD" "$(cat ${{ steps.openai.outputs.review_file }})")
          gh pr comment "$PR_NUMBER" --body "$BODY"
