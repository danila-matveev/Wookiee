name: Code Quality Scan (Night DevOps)

# Wave B5 of Nighttime DevOps Agent. Runs ruff/mypy/vulture and (Phase 2)
# Codex sidecar for ambiguous findings. Emits JSON to .hygiene/reports/.
# Does NOT open a PR — consumed by night-coordinator at 04:00 UTC.
#
# Plan: docs/superpowers/plans/2026-05-14-nighttime-devops-agent-impl.md §3.2, §12

on:
  schedule:
    - cron: "30 3 * * *"  # 03:30 UTC
  workflow_dispatch:

concurrency:
  group: night-devops
  cancel-in-progress: false

jobs:
  code-quality-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install code-quality deps
        run: |
          python -m pip install --upgrade pip
          pip install "ruff>=0.15,<0.16" "mypy>=1.10" "vulture>=2" "pipdeptree>=2" pyyaml jsonschema python-dotenv

      - name: Run /code-quality-scan via Claude Code action
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "/code-quality-scan --json-output"
          claude_args: "--allowed-tools Bash,Read,Edit,Write,Skill"
        env:
          TELEGRAM_ALERTS_BOT_TOKEN: ${{ secrets.TELEGRAM_ALERTS_BOT_TOKEN }}
          HYGIENE_TELEGRAM_CHAT_ID: ${{ secrets.HYGIENE_TELEGRAM_CHAT_ID }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          # Codex sidecar OAuth (Phase 2) — wrapper script writes ~/.codex/auth.json
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          HYGIENE_ENV: github_actions

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-quality-report-${{ github.run_id }}
          path: |
            .hygiene/reports/code-quality-*.json
            .hygiene/codex_logs/**
          if-no-files-found: warn
          retention-days: 30

      - name: Telegram alert on failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_ALERTS_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.HYGIENE_TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT}" \
              -d "text=Не доделал проверку качества кода (линтер, типы, мёртвый код).%0A%0AРепо не тронул. Ночной разборщик пойдёт без этих находок — фиксы поедут только из основного сканера.%0AЛоги: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              > /dev/null
          fi
