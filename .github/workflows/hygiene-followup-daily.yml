name: Hygiene Follow-up Daily

on:
  schedule:
    - cron: "0 6 * * *"  # 06:00 UTC = 3 hours after main hygiene (gives main run time to finish + main to stabilise)
  workflow_dispatch:

concurrency:
  group: hygiene-followup-daily
  cancel-in-progress: false

jobs:
  hygiene-followup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout fresh main (read-only)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (re-validation needs same env as hygiene)
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary python-dotenv pyyaml requests

      - name: Run /hygiene-followup via Claude Code action
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "/hygiene-followup"
          claude_args: "--allowed-tools Bash,Read,Skill"
        env:
          TELEGRAM_ALERTS_BOT_TOKEN: ${{ secrets.TELEGRAM_ALERTS_BOT_TOKEN }}
          HYGIENE_TELEGRAM_CHAT_ID: ${{ secrets.HYGIENE_TELEGRAM_CHAT_ID }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HYGIENE_TRIGGER: ${{ github.event_name }}
          HYGIENE_ENV: github_actions
