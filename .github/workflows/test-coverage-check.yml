name: Test Coverage Check (Night DevOps)

# Wave B5 of Nighttime DevOps Agent. Gates the night PR merge if coverage
# drops below .hygiene/config.yaml: coverage_min_pct (default 60). Also runs
# rollback verification for fresh fix_log entries via scripts/nightly/rollback_check.py.
#
# Plan: docs/superpowers/plans/2026-05-14-nighttime-devops-agent-impl.md §4.3, §10

on:
  schedule:
    - cron: "30 4 * * *"  # 04:30 UTC
  workflow_dispatch:

concurrency:
  group: night-devops
  cancel-in-progress: false

jobs:
  test-coverage-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            services/sheets_sync/requirements.txt
            services/content_kb/requirements.txt
            services/wb_logistics_api/requirements.txt
            services/influencer_crm/requirements.txt

      - name: Install test + coverage deps
        run: |
          python -m pip install --upgrade pip
          pip install -r services/sheets_sync/requirements.txt
          pip install -r services/content_kb/requirements.txt
          pip install -r services/wb_logistics_api/requirements.txt
          pip install -r services/influencer_crm/requirements.txt
          pip install "pytest>=7.4.0" "pytest-asyncio>=0.23.0" "pytest-cov>=4.1.0" \
                      openpyxl "fastapi>=0.110" "httpx>=0.27" requests schedule \
                      "ruff>=0.15,<0.16" psycopg2-binary python-dotenv pyyaml jsonschema

      - name: Run /test-coverage-check via Claude Code action
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "/test-coverage-check --json-output"
          claude_args: "--allowed-tools Bash,Read,Edit,Write,Skill"
        env:
          TELEGRAM_ALERTS_BOT_TOKEN: ${{ secrets.TELEGRAM_ALERTS_BOT_TOKEN }}
          HYGIENE_TELEGRAM_CHAT_ID: ${{ secrets.HYGIENE_TELEGRAM_CHAT_ID }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HYGIENE_ENV: github_actions

      - name: Upload coverage report artifact
        if: always()
        continue-on-error: true  # GitHub Artifact storage сбоит — пусть это не валит весь job
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.run_id }}
          path: .hygiene/reports/coverage-*.json
          if-no-files-found: warn
          retention-days: 30

      - name: Telegram alert on failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_ALERTS_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.HYGIENE_TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT}" \
              -d "text=Не доделал проверку покрытия тестами.%0A%0AРепо не тронул. Покрытие, скорее всего, на месте — но точно скажу только когда сам гляну логи.%0AЛоги: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              > /dev/null
          fi
