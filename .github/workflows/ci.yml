name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            agents/oleg/requirements.txt
            services/sheets_sync/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agents/oleg/requirements.txt
          pip install -r services/sheets_sync/requirements.txt
          pip install requests schedule "ruff>=0.15,<0.16"

      - name: Lint & security scan (ruff)
        run: ruff check agents services shared scripts

      - name: Compile all Python modules
        run: python -m compileall -q agents services shared scripts

      - name: Run tests
        run: python -m pytest -q tests

      - name: Run marketplace ETL tests
        run: python -m pytest -q services/marketplace_etl/tests
