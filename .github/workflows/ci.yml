name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check for secrets in tracked files
        run: |
          # Fail if .env files are tracked (excluding .env.example)
          if git ls-files | grep -E '^\.env$|^\.env\.' | grep -v '.env.example'; then
            echo "ERROR: .env file is tracked in git!"
            exit 1
          fi
          # Fail if credential files are tracked
          if git ls-files | grep -iE 'google_sa\.json|credentials\.json|service.account.*\.json'; then
            echo "ERROR: Credential file is tracked in git!"
            exit 1
          fi
          echo "No secrets found in tracked files"

      - name: Verify imports
        run: |
          pip install python-dotenv
          python -c "from shared.config import PROJECT_ROOT; print('shared.config OK')"
          python -c "from shared.data_layer import get_wb_finance; print('shared.data_layer OK')"
          echo "Import verification passed"

      - name: Check Python syntax
        run: |
          python -m py_compile shared/config.py
          python -m py_compile shared/data_layer.py
          python -m py_compile shared/db_config.py
          echo "Syntax check passed"
