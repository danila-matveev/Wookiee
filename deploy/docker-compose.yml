services:
  # ── Oleg v1 (ОТКЛЮЧЁН — заменён на v2) ──
  # wookiee-agent и wookiee-bot убраны: v2 объединяет agent + bot + scheduler
  # в один контейнер. Оба используют один TELEGRAM_BOT_TOKEN, поэтому
  # одновременный запуск v1 и v2 невозможен (конфликт polling).

  # ── Oleg v2: единый контейнер (bot + agent + scheduler + watchdog) ──
  wookiee-oleg-v2:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: wookiee_oleg_v2
    restart: unless-stopped
    command: ["python", "-m", "agents.oleg_v2"]

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow

    volumes:
      - ../agents/oleg_v2/data:/app/agents/oleg_v2/data
      - ../agents/oleg_v2/logs:/app/agents/oleg_v2/logs
      - ../reports:/app/reports
      - ../scripts:/app/scripts:ro

    networks:
      - n8n-docker-caddy_default

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # ── Sheets Sync: ежедневная синхронизация данных в Google Sheets ──
  sheets-sync:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: wookiee_sheets_sync
    restart: unless-stopped
    command: ["python", "-m", "services.sheets_sync.control_panel"]

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow

    volumes:
      - ../services/sheets_sync/credentials:/app/services/sheets_sync/credentials:ro

    networks:
      - n8n-docker-caddy_default

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ── Vasily API: HTTP-эндпоинт для запуска расчёта перестановок из Google Sheets ──
  vasily-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.vasily_api
    container_name: vasily-api
    restart: unless-stopped

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow

    volumes:
      - ../services/sheets_sync/credentials:/app/services/sheets_sync/credentials:ro
      - ../services/wb_localization/data:/app/services/wb_localization/data

    networks:
      - n8n-docker-caddy_default

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  n8n-docker-caddy_default:
    external: true
