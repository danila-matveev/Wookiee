services:
  # ── Oleg: единый контейнер (bot + agent + scheduler + watchdog) ──
  wookiee-oleg:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: wookiee_oleg
    restart: unless-stopped
    command: ["python", "-m", "agents.oleg"]

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow

    volumes:
      - ../agents/oleg/data:/app/agents/oleg/data
      - ../agents/oleg/logs:/app/agents/oleg/logs
      - ../reports:/app/reports
      - ../scripts:/app/scripts:ro

    networks:
      - n8n-docker-caddy_default

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M

  # ── Sheets Sync: ежедневная синхронизация данных в Google Sheets ──
  sheets-sync:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: wookiee_sheets_sync
    restart: unless-stopped
    command: ["python", "-m", "services.sheets_sync.control_panel"]

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow

    volumes:
      - ../services/sheets_sync/credentials:/app/services/sheets_sync/credentials:ro

    networks:
      - n8n-docker-caddy_default

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ── Vasily API: HTTP-эндпоинт для запуска расчёта перестановок из Google Sheets ──
  vasily-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.vasily_api
    container_name: vasily-api
    restart: unless-stopped

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow

    volumes:
      - ../services/sheets_sync/credentials:/app/services/sheets_sync/credentials:ro
      - ../services/wb_localization/data:/app/services/wb_localization/data

    networks:
      - n8n-docker-caddy_default

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ── Oleg MCP Server: exposes Oleg tools via MCP SSE transport ──
  oleg-mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: oleg_mcp
    restart: unless-stopped
    command: ["python", "-m", "agents.oleg.mcp_server"]

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8080

    volumes:
      - ../agents/oleg/data:/app/agents/oleg/data
      - ../scripts:/app/scripts:ro

    networks:
      - n8n-docker-caddy_default

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ── WB MCP Server (ИП): Wildberries Seller API via MCP ──
  wb-mcp-ip:
    build:
      context: /opt/wildberries-mcp-server
      dockerfile: Dockerfile
    container_name: wb_mcp_ip
    restart: unless-stopped

    environment:
      - WB_API_TOKEN=${WB_API_TOKEN_IP}
      - MCP_TRANSPORT=http
      - MCP_PORT=8080

    networks:
      - n8n-docker-caddy_default

    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:8080/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── WB MCP Server (ООО): Wildberries Seller API via MCP ──
  wb-mcp-ooo:
    build:
      context: /opt/wildberries-mcp-server
      dockerfile: Dockerfile
    container_name: wb_mcp_ooo
    restart: unless-stopped

    environment:
      - WB_API_TOKEN=${WB_API_TOKEN_OOO}
      - MCP_TRANSPORT=http
      - MCP_PORT=8080

    networks:
      - n8n-docker-caddy_default

    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:8080/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Eggent: AI workspace with Oleg agent ──
  eggent:
    build:
      context: /opt/eggent
      dockerfile: Dockerfile
    container_name: eggent
    restart: unless-stopped

    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3000

    ports:
      - "127.0.0.1:3100:3000"

    volumes:
      - eggent-data:/app/data

    networks:
      - n8n-docker-caddy_default

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M

    depends_on:
      - oleg-mcp

  # ── Dashboard API: HTTP-эндпоинт для дашборда аналитики ──
  dashboard-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.dashboard_api
    container_name: wookiee_dashboard_api
    restart: unless-stopped

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow

    ports:
      - "127.0.0.1:8001:8001"

    networks:
      - n8n-docker-caddy_default

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  eggent-data:

networks:
  n8n-docker-caddy_default:
    external: true
