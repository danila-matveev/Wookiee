services:
  # ── Oleg v3: micro-agent system (bot + scheduler + watchdog) ──
  wookiee-oleg:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: wookiee_oleg
    restart: unless-stopped
    command: ["python", "-m", "agents.v3"]

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow

    volumes:
      - ../agents/v3/data:/app/agents/v3/data
      - ../agents/oleg/data:/app/agents/oleg/data
      - ../services/etl/data:/app/services/etl/data
      - ../reports:/app/reports
      - ../scripts:/app/scripts:ro

    networks:
      - n8n-docker-caddy_default

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1536M
        reservations:
          cpus: '0.5'
          memory: 512M

  # ── Finolog ДДС: еженедельная сводка cash flow (понедельник 09:00 MSK) ──
  finolog-cron:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: wookiee_finolog_cron
    restart: unless-stopped
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        apt-get update -qq && apt-get install -y -qq cron > /dev/null 2>&1
        echo "0 9 * * 1 cd /app && python -m scripts.run_finolog_weekly --deliver >> /proc/1/fd/1 2>&1" | crontab -
        echo "Finolog cron installed: Monday 09:00 MSK"
        cron -f

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow

    networks:
      - n8n-docker-caddy_default

    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # ── Sheets Sync: ежедневная синхронизация данных в Google Sheets ──
  sheets-sync:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: wookiee_sheets_sync
    restart: unless-stopped
    command: ["python", "-m", "services.sheets_sync.control_panel"]

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow

    volumes:
      - ../services/sheets_sync/credentials:/app/services/sheets_sync/credentials:ro

    networks:
      - n8n-docker-caddy_default

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ── Vasily API: HTTP-эндпоинт для запуска расчёта перестановок из Google Sheets ──
  vasily-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.vasily_api
    container_name: vasily-api
    restart: unless-stopped

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow

    volumes:
      - ../services/sheets_sync/credentials:/app/services/sheets_sync/credentials:ro
      - ../services/wb_localization/data:/app/services/wb_localization/data

    networks:
      - n8n-docker-caddy_default

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ── WB MCP Server (ИП): Wildberries Seller API via MCP ──
  wb-mcp-ip:
    build:
      context: /opt/wildberries-mcp-server
      dockerfile: Dockerfile
    container_name: wb_mcp_ip
    restart: unless-stopped

    environment:
      - WB_API_TOKEN=${WB_API_TOKEN_IP}
      - MCP_TRANSPORT=http
      - MCP_PORT=8080

    networks:
      - n8n-docker-caddy_default

    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:8080/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── WB MCP Server (ООО): Wildberries Seller API via MCP ──
  wb-mcp-ooo:
    build:
      context: /opt/wildberries-mcp-server
      dockerfile: Dockerfile
    container_name: wb_mcp_ooo
    restart: unless-stopped

    environment:
      - WB_API_TOKEN=${WB_API_TOKEN_OOO}
      - MCP_TRANSPORT=http
      - MCP_PORT=8080

    networks:
      - n8n-docker-caddy_default

    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:8080/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Bitrix24 MCP Server: tasks, CRM, users via MCP ──
  bitrix24-mcp:
    build:
      context: /opt/bitrix24-mcp-server
      dockerfile: Dockerfile
    container_name: bitrix24_mcp
    restart: unless-stopped

    environment:
      - BITRIX24_WEBHOOK_URL=${BITRIX24_WEBHOOK_URL}
      - MCP_TRANSPORT=http
      - MCP_PORT=8080

    networks:
      - n8n-docker-caddy_default

    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:8080/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Dashboard API: HTTP-эндпоинт для дашборда аналитики ──
  dashboard-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.dashboard_api
    container_name: wookiee_dashboard_api
    restart: unless-stopped

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow

    ports:
      - "127.0.0.1:8001:8001"

    networks:
      - n8n-docker-caddy_default

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ── Knowledge Base API: векторный поиск по базе знаний ──
  knowledge-base:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.knowledge_base
    container_name: wookiee_knowledge_base
    restart: unless-stopped

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow

    ports:
      - "127.0.0.1:8002:8002"

    networks:
      - n8n-docker-caddy_default

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  n8n-docker-caddy_default:
    external: true
