services:
  # ── Wookiee cron: scheduled jobs (search queries sync + sheets sync) ──
  wookiee-cron:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: wookiee_cron
    restart: unless-stopped
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        (echo "PATH=/usr/local/bin:/usr/bin:/bin"; echo "PYTHONPATH=/app"; echo "0 10 * * 1 cd /app && python scripts/run_search_queries_sync.py >> /proc/1/fd/1 2>&1"; echo "0 6 * * * cd /app && python scripts/sync_sheets_to_supabase.py --level all >> /proc/1/fd/1 2>&1"; echo "0 12 * * 1 cd /app && python scripts/run_wb_promocodes_sync.py >> /proc/1/fd/1 2>&1"; echo "0 */6 * * * cd /app && python -m services.influencer_crm.scripts.etl_runner >> /proc/1/fd/1 2>&1") | crontab -
        echo "Wookiee cron installed: search queries Mon 10:00 + sheets sync daily 06:00 + promocodes Mon 12:00 MSK + CRM ETL every 6h"
        cron -f

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow

    volumes:
      - ../services/etl/data:/app/services/etl/data
      - ../reports:/app/reports
      - ../scripts:/app/scripts:ro

    networks:
      - n8n-docker-caddy_default

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1536M
        reservations:
          cpus: '0.5'
          memory: 512M

  # ── Sheets Sync: ежедневная синхронизация данных в Google Sheets ──
  sheets-sync:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: wookiee_sheets_sync
    restart: unless-stopped
    command: ["python", "-m", "services.sheets_sync.control_panel"]

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow

    volumes:
      - ../services/sheets_sync/credentials:/app/services/sheets_sync/credentials:ro

    networks:
      - n8n-docker-caddy_default

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ── WB Logistics API: HTTP-эндпоинт для запуска расчёта перестановок из Google Sheets ──
  wb-logistics-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.wb_logistics_api
    container_name: wb-logistics-api
    restart: unless-stopped

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow

    volumes:
      - ../services/sheets_sync/credentials:/app/services/sheets_sync/credentials:ro
      - ../services/wb_localization/data:/app/services/wb_localization/data

    networks:
      - n8n-docker-caddy_default

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1536M
        reservations:
          cpus: '0.5'
          memory: 512M

  # ── Influencer CRM API: FastAPI BFF + pre-built React SPA ──
  influencer-crm-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.influencer_crm_api
      args:
        VITE_API_KEY: ${INFLUENCER_CRM_API_KEY:-}
    container_name: influencer_crm_api
    restart: unless-stopped

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow

    networks:
      - n8n-docker-caddy_default

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ── WB MCP Server (ИП): Wildberries Seller API via MCP ──
  wb-mcp-ip:
    build:
      context: /opt/wildberries-mcp-server
      dockerfile: Dockerfile
    container_name: wb_mcp_ip
    restart: unless-stopped

    environment:
      - WB_API_TOKEN=${WB_API_KEY_IP}
      - MCP_TRANSPORT=http
      - MCP_PORT=8080

    networks:
      - n8n-docker-caddy_default

    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:8080/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── WB MCP Server (ООО): Wildberries Seller API via MCP ──
  wb-mcp-ooo:
    build:
      context: /opt/wildberries-mcp-server
      dockerfile: Dockerfile
    container_name: wb_mcp_ooo
    restart: unless-stopped

    environment:
      - WB_API_TOKEN=${WB_API_KEY_OOO}
      - MCP_TRANSPORT=http
      - MCP_PORT=8080

    networks:
      - n8n-docker-caddy_default

    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:8080/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Bitrix24 MCP Server: tasks, CRM, users via MCP ──
  bitrix24-mcp:
    build:
      context: /opt/bitrix24-mcp-server
      dockerfile: Dockerfile
    container_name: bitrix24_mcp
    restart: unless-stopped

    environment:
      - BITRIX24_WEBHOOK_URL=${BITRIX24_WEBHOOK_URL}
      - MCP_TRANSPORT=http
      - MCP_PORT=8080

    networks:
      - n8n-docker-caddy_default

    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:8080/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Analytics API: РНП (Рука на пульсе) weekly analytics dashboard ──
  analytics-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.analytics_api
    container_name: analytics_api
    restart: unless-stopped

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow

    volumes:
      - ../services/sheets_sync/credentials:/app/services/sheets_sync/credentials:ro

    networks:
      - n8n-docker-caddy_default

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  n8n-docker-caddy_default:
    external: true
