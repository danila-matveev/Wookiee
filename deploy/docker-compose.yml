services:
  wookiee-bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: wookiee_analytics_bot
    restart: unless-stopped

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow

    volumes:
      # Persist data and logs
      - ../agents/oleg/data:/app/agents/oleg/data
      - ../agents/oleg/logs:/app/agents/oleg/logs
      - ../reports:/app/reports

      # Mount scripts directory for live updates if needed
      - ../scripts:/app/scripts:ro

    networks:
      - n8n-docker-caddy_default

    # Health check — реальная проверка (Telegram + DB + PID)
    healthcheck:
      test: ["CMD", "python", "/app/deploy/healthcheck.py"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

networks:
  n8n-docker-caddy_default:
    external: true
