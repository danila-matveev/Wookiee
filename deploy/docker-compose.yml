services:
  # ── Agent: генерация отчётов по расписанию (никогда не останавливается) ──
  wookiee-agent:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: wookiee_analytics_agent
    restart: unless-stopped
    command: ["python", "-m", "agents.oleg", "agent"]

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow

    volumes:
      - ../agents/oleg/data:/app/agents/oleg/data
      - ../agents/oleg/logs:/app/agents/oleg/logs
      - ../reports:/app/reports
      - ../scripts:/app/scripts:ro

    networks:
      - n8n-docker-caddy_default

    healthcheck:
      test: ["CMD", "python", "/app/deploy/healthcheck_agent.py"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # ── Bot: Telegram UI + доставка отчётов из delivery_queue ──
  wookiee-bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: wookiee_analytics_bot
    restart: unless-stopped
    command: ["python", "-m", "agents.oleg", "bot"]

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow

    volumes:
      - ../agents/oleg/data:/app/agents/oleg/data
      - ../agents/oleg/logs:/app/agents/oleg/logs
      - ../reports:/app/reports
      - ../scripts:/app/scripts:ro

    networks:
      - n8n-docker-caddy_default

    depends_on:
      - wookiee-agent

    healthcheck:
      test: ["CMD", "python", "/app/deploy/healthcheck.py"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ── Sheets Sync: ежедневная синхронизация данных в Google Sheets ──
  sheets-sync:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.sheets_sync
    container_name: wookiee_sheets_sync
    restart: unless-stopped

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow
      - SYNC_TEST_MODE=true

    volumes:
      - ../services/sheets_sync/credentials:/app/services/sheets_sync/credentials:ro

    networks:
      - n8n-docker-caddy_default

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

networks:
  n8n-docker-caddy_default:
    external: true
