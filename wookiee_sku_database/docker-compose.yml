# Docker Compose для локальной разработки
# База данных спецификаций товаров Wookiee

version: '3.8'

services:
  # PostgreSQL база данных
  postgres:
    image: postgres:16-alpine
    container_name: wookiee_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wookiee_sku
      POSTGRES_USER: wookiee
      POSTGRES_PASSWORD: wookiee_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      # Персистентное хранилище данных
      - postgres_data:/var/lib/postgresql/data
      # Инициализационные скрипты (выполняются при первом запуске)
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/triggers.sql:/docker-entrypoint-initdb.d/02_triggers.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wookiee -d wookiee_sku"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wookiee_network

  # pgAdmin для веб-интерфейса управления БД (опционально)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: wookiee_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@wookiee.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wookiee_network
    profiles:
      - tools  # Запускается только с --profile tools

volumes:
  postgres_data:
    name: wookiee_postgres_data
  pgadmin_data:
    name: wookiee_pgadmin_data

networks:
  wookiee_network:
    name: wookiee_network
    driver: bridge
